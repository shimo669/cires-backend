<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>CIRES - Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card mx-auto" style="max-width: 500px;">
        <div class="card-body">
            <h3 class="text-center">Citizen Registration</h3>
            <form th:action="@{/register}" method="post">
                <div class="mb-3">
                    <label>Full Name (Username)</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>National ID (16 Digits)</label>
                    <input type="text" name="national_id" class="form-control" maxlength="16" required>
                </div>
                <div class="mb-3">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password_hash" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Create Account</button>
            </form>
            <div class="mt-3 text-center">
                <a href="/login">Already have an account? Login here</a>
            </div>
        </div>
    </div>
</div>
</body>
</html>
