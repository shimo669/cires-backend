# Database Configuration (Uses Render variables if available, otherwise defaults to local)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/cires_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
# We remove the hardcoded MySQL driver so Spring can pick the right one (Postgres or MySQL)
# spring.datasource.driver-class-name is omitted to let Spring Boot auto-detect

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=${HIBERNATE_DIALECT:org.hibernate.dialect.MySQLDialect}

# Server Settings
server.port=${PORT:8081}
spring.sql.init.mode=never

# Thymeleaf Settings
spring.thymeleaf.check-template-location=false 

# JWT Configuration
jwt.secret=${JWT_SECRET:your-secret-key-change-this-in-production}
jwt.expiration=86400000