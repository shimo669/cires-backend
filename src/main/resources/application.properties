spring.datasource.url=jdbc:mysql://localhost:3306/cires_db
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Server Settings
server.port=8081
spring.sql.init.mode=always

# Thymeleaf Settings (REST API only, no templates)
spring.thymeleaf.check-template-location=false 

# JWT Configuration
jwt.secret=your-secret-key-change-this-in-production-to-something-very-secure-and-long-at-least-256-bits-for-hs512
jwt.expiration=86400000