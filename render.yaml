services:
  # 1. The Spring Boot Backend
  - type: web
    name: cires-backend
    runtime: java
    plan: free
    buildContext: .
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: cires-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: cires-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: cires-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update

  # 2. The MySQL Database (Deployed via Docker)
  - type: pserv
    name: cires-db
    runtime: docker
    plan: free
    envVars:
      - key: MYSQL_DATABASE
        value: cires_db
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_USER
        value: cires_user
      - key: MYSQL_PASSWORD
        generateValue: true
    disk:
      name: mysql-data
      mountPath: /var/lib/mysql
      sizeGB: 1