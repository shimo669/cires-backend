services:
  - type: web
    name: cires-backend
    # Use 'docker' since your project has a Dockerfile and it's more reliable
    runtime: docker
    plan: free
    envVars:
      # Manually building the JDBC URL because Blueprint doesn't support the JDBC property
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
      - key: DB_HOST
        fromDatabase:
          name: cires-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: cires-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: cires-db
          property: database
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: cires-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: cires-db
          property: password
      - key: HIBERNATE_DIALECT
        value: org.hibernate.dialect.PostgreSQLDialect
      - key: PORT
        value: 8081
      - key: JWT_SECRET
        value: 0b62960339444a8db6526c8ecfc45683

databases:
  - name: cires-db
    plan: free