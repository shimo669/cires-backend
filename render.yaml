services:
  # 1. The Spring Boot Backend
  - type: web
    name: cires-backend
    runtime: java
    plan: free
    buildCommand: ./mvnw clean install -DskipTests
    startCommand: java -jar target/*.jar
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: cires-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: cires-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: cires-db
          property: password
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update

# 2. The Native Managed Database
databases:
  - name: cires-db
    databaseName: cires_db
    user: cires_user
    plan: free